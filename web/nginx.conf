# ==============================================
# BOOKSNAP FRONTEND - Nginx Configuration
# ==============================================
# Configuration optimized for SPA (Single Page Application)
# ==============================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Root of static files (built by Vite)
    root /usr/share/nginx/html;
    index index.html;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ==========================================
    # SPA FALLBACK (Vaadin Router)
    # ==========================================
    # All non-file routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # STATIC ASSET CACHING
    # ==========================================
    # Hashed assets (e.g. index-DCFUihn1.css) → long-lived cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==========================================
    # NO CACHE FOR INDEX.HTML
    # ==========================================
    # Always refetch index.html to detect new versions
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ==========================================
    # SECURITY HEADERS
    # ==========================================
    # Protection against clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Protection against MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS protection (old browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy (don't leak the URL to external sites)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy (restrict access to camera, microphone, etc)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ==========================================
    # COMPRESSION GZIP
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # ==========================================
    # OPTIMISATIONS
    # ==========================================
    # Buffers
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 8m;
    large_client_header_buffers 2 1k;

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # ==========================================
    # ERROR PAGES
    # ==========================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
