# ==============================================
# BOOKSNAP - Docker Compose Configuration
# ==============================================
# Services : PostgreSQL, Backend (Spring Boot), Frontend (Lit + Nginx)
# Usage : docker compose up --build
# ==============================================

services:
  # ======================
  # DATABASE (PostgreSQL)
  # ======================
  db:
    container_name: booksnap-postgres
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - '${DB_PORT:-5432}:5432'

    volumes:
      # Data persistence
      - db-data:/var/lib/postgresql/data

      # Auto-init SQL (executed in alphabetical order on first startup)
      - ./server/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./server/sql/dewey.sql:/docker-entrypoint-initdb.d/02-dewey.sql:ro
      - ./server/sql/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - booksnap-network

  # ======================
  # PGADMIN (optional - DB interface)
  # ======================
  pgadmin:
    container_name: booksnap-pgadmin
    image: dpage/pgadmin4:latest
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'

    ports:
      - '${PGADMIN_PORT:-5050}:80'

    depends_on:
      db:
        condition: service_healthy

    networks:
      - booksnap-network

  # ======================
  # BACKEND (Spring Boot)
  # ======================
  backend:
    container_name: booksnap-backend
    build:
      context: ./server
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      # Database connection (uses the Docker service name)
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      # Spring profiles
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}

      # BunnyCDN
      BUNNY_API_KEY: ${BUNNY_API_KEY:-}

    ports:
      - '${BACKEND_PORT:-8080}:8080'

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - booksnap-network

  # ======================
  # FRONTEND (Lit + Nginx)
  # ======================
  frontend:
    container_name: booksnap-frontend
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Backend API URL (accessible from the browser, not from the container)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}

    restart: unless-stopped

    ports:
      - '${FRONTEND_PORT:-3000}:80'

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

    networks:
      - booksnap-network

# ======================
# NETWORKS
# ======================
networks:
  booksnap-network:
    driver: bridge
    name: booksnap-network

# ======================
# VOLUMES
# ======================
volumes:
  db-data:
    driver: local
    name: booksnap-db-data
